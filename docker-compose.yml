version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    # This tells Docker to load variables from your server's .env file!
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=rootpassword
      - POSTGRES_DB=shortify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: